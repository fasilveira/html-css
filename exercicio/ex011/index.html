<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias HTML 5 </title>
</head>
<body>
    
    <h1>Imagem Dinâmica </h1>

    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua  o tamanho do seu 
        navegador. </p>

    <picture>
        <source media="(max-width: 750px )" srcset="imagens/fotop.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem Flexivel">

    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>

    <audio preload="metadata" autoplay controls loop >
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audiog/ogg">   /* exememple*/
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <p>O seu navegador não é compativel com o audio <a href="midia/guanacast-33.mp3">
            Faça o download e escute o MP3</a></p>

    </audio>
    <br>

    <audio preload="metadata" autoplay controls loop>
        <source src="midia/walk-with-me.mp3" type="audio/mpeg">
    </audio>
    
</body> 
</html>
