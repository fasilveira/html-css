<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>

    <style>
        @font-face {
            font-family: 'Love';
            src: url('fonts/filxgirl.TTF') format(truetype);
            font-weight: normal;
            font-style: normal;

            /*
            Tipos de format()
            -opentype (otf)
            - truetype (ttf)
            -embedded-opentype
            truetype-att(apple advance typography)
            -svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normalf;
        }
    </style>

</head>
<body>

    <h1> Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Id autem dolores pariatur necessitatibus odit officia consequuntur libero doloremque sapiente, natus, dolorum assumenda ipsa. Pariatur, delectus quasi eos id impedit eius.</p>
    
</body>
</html>
