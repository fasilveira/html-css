<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servido. </p>

   <video width="560" controls poster="imagens/picanha.jpg" loop>
        <source src="midia/Picanha-Video1.webm" type="video/webm">
        <source src="midia/picanha-video.mp4" type="video/mp4">
        <source src="midia/Picanha-Video1.mkv" type="video/mkv">
        <p>O seu navegador não é compatibilidade com reprodutor de video   </p>

    </video>   
    
    <h1>Inserindo vídeo do Youtube</h1>
    
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VQRLujxTm3c?si=vOVyTu2PepDmV4eX&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    

    <h1>Inserindo vídeos do Vimeo</h1>
    <iframe src="https://player.vimeo.com/video/197093965?color=ff9933&portrait=0" width="560" height="315" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>

    
    
</body>
</html>
